  - id: google-platform-migration
    name: Google Maps Platform paid integration
    status: TODO
    owner: Team
    priority: P0
    notes: Paid-version direction is to replace the inherited Mapbox and OTP provider stack with Google Maps Platform for map rendering, route estimation, and supporting place lookup/geocoding flows while preserving the existing planner and itinerary experience.
    milestones:
      - id: GP1
        title: Replace map rendering with Google Maps JavaScript integration
        state: TODO
      - id: GP2
        title: Add Google routing adapter for drive, walk, and transit estimates
        state: TODO
      - id: GP3
        title: Integrate Google Places and Geocoding for search and map context actions
        state: TODO
      - id: GP4
        title: Normalize Google route payloads for planner and itinerary consumers
        state: TODO
      - id: GP5
        title: Replace OTP and Mapbox settings/docs with paid Google configuration flow
        state: TODO
    definitionOfDone:
      - Map display, route geometry, and route estimates no longer depend on Mapbox in the paid app.
      - Paid search and reverse-geocoding flows can run against Google APIs with explicit quota and error handling.
      - The paid app no longer requires OTP runtime setup to access provider-backed routing features.
      - Planner and itinerary behavior remain regression-safe after the provider swap.
